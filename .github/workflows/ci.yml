name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # Job 1: Build and test on iOS Simulator
  # LEARNING — Why xcodebuild not swift build:
  # `swift build` runs on macOS and doesn't have UIKit or Vision.
  # These are iOS frameworks. We need xcodebuild with an iOS Simulator
  # target to compile and test iOS-specific code in CI.
  # ─────────────────────────────────────────
  swift-tests:
    name: Swift Tests (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      # List available simulators so we can pick the right destination
      - name: List available simulators
        run: xcrun simctl list devices available | grep iPhone

      # Build targeting iOS Simulator
      # CODE_SIGN_IDENTITY="" skips code signing — not needed in CI
      # tee preserves xcodebuild's exit code (pipefail-safe); grep with || true
      # avoids failing the step when no lines match (e.g. zero-warning builds).
      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme Visara \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee build_output.txt
          grep -iE "(error:|warning:|BUILD SUCCEEDED|BUILD FAILED)" build_output.txt || true

      # Run tests on iOS Simulator
      # Use 'OS=latest' so CI picks whatever iOS SDK ships with the runner's Xcode.
      - name: Test on iOS Simulator
        run: |
          xcodebuild test \
            -scheme Visara \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee test_output.txt
          grep -iE "(error:|Test Case|passed|failed|BUILD SUCCEEDED|BUILD FAILED)" test_output.txt || true

  # ─────────────────────────────────────────
  # Job 2: TypeScript type check
  # ─────────────────────────────────────────
  typescript-check:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # LEARNING — npm install vs npm ci:
      # npm ci requires a package-lock.json (strict, reproducible builds).
      # npm install generates one if missing (flexible, for development).
      # We use npm install until we commit a lock file.
      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit
